<!DOCTYPE html>
<html lang="da">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Nulstil adgangskode — Gainfully</title>
  <link rel="preconnect" href="https://fonts.googleapis.com" />
  <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700;900&display=swap" rel="stylesheet" />
  <style>
    *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }

    :root {
      --bg: #0b1120;
      --bg2: #111c30;
      --border: #1d2f4a;
      --volt: #c4ff00;
      --volt-dark: #0d1700;
      --text: #eef2ff;
      --muted: #7b91b5;
      --dim: #3d5070;
      --error: #ff4d4d;
      --success: #c4ff00;
    }

    body {
      background: var(--bg);
      color: var(--text);
      font-family: 'Inter', sans-serif;
      line-height: 1.6;
      min-height: 100vh;
      display: flex;
      align-items: center;
      justify-content: center;
      padding: 24px;
    }

    body::before {
      content: '';
      position: fixed;
      inset: 0;
      background-image: radial-gradient(circle, rgba(255,255,255,0.04) 1px, transparent 1px);
      background-size: 32px 32px;
      pointer-events: none;
      z-index: 0;
    }

    .card {
      position: relative;
      z-index: 1;
      background: var(--bg2);
      border: 1px solid var(--border);
      border-radius: 20px;
      padding: 40px 32px;
      width: 100%;
      max-width: 420px;
      text-align: center;
    }

    .logo {
      width: 64px;
      height: 64px;
      background: var(--volt);
      border-radius: 16px;
      display: flex;
      align-items: center;
      justify-content: center;
      margin: 0 auto 20px;
      font-size: 28px;
      font-weight: 900;
      color: var(--bg);
    }

    h1 {
      font-size: 22px;
      font-weight: 700;
      margin-bottom: 8px;
    }

    .subtitle {
      color: var(--muted);
      font-size: 14px;
      margin-bottom: 28px;
    }

    .form-group {
      margin-bottom: 16px;
      text-align: left;
    }

    label {
      display: block;
      font-size: 13px;
      font-weight: 600;
      color: var(--muted);
      margin-bottom: 8px;
    }

    input {
      width: 100%;
      background: var(--bg);
      border: 1px solid var(--border);
      border-radius: 12px;
      padding: 14px 16px;
      color: var(--text);
      font-size: 15px;
      font-family: 'Inter', sans-serif;
      outline: none;
      transition: border-color 0.2s;
    }

    input:focus {
      border-color: var(--volt);
    }

    button {
      width: 100%;
      background: var(--volt);
      color: var(--bg);
      border: none;
      border-radius: 12px;
      padding: 16px;
      font-size: 15px;
      font-weight: 700;
      font-family: 'Inter', sans-serif;
      cursor: pointer;
      margin-top: 8px;
      transition: opacity 0.2s;
    }

    button:hover { opacity: 0.9; }
    button:disabled { opacity: 0.5; cursor: not-allowed; }

    .message {
      margin-top: 20px;
      padding: 14px 16px;
      border-radius: 12px;
      font-size: 14px;
      font-weight: 500;
      display: none;
    }

    .message.error {
      background: rgba(255, 77, 77, 0.1);
      border: 1px solid rgba(255, 77, 77, 0.3);
      color: #ff6b6b;
    }

    .message.success {
      background: rgba(196, 255, 0, 0.1);
      border: 1px solid rgba(196, 255, 0, 0.3);
      color: var(--volt);
    }

    .open-app {
      display: none;
      margin-top: 20px;
      padding: 16px;
      background: var(--volt);
      color: var(--bg);
      border-radius: 12px;
      font-weight: 700;
      font-size: 15px;
      text-decoration: none;
      cursor: pointer;
    }

    .invalid-link {
      display: none;
    }

    .footer {
      margin-top: 24px;
      color: var(--dim);
      font-size: 12px;
    }
  </style>
</head>
<body>

<div class="card">
  <div class="logo">G</div>

  <!-- Normalt reset-formular -->
  <div id="reset-form">
    <h1>Vælg ny adgangskode</h1>
    <p class="subtitle">Indtast din nye adgangskode nedenfor.</p>

    <div class="form-group">
      <label for="password">Ny adgangskode</label>
      <input type="password" id="password" placeholder="Mindst 6 tegn" autocomplete="new-password" />
    </div>

    <div class="form-group">
      <label for="confirm">Bekræft adgangskode</label>
      <input type="password" id="confirm" placeholder="Gentag adgangskode" autocomplete="new-password" />
    </div>

    <button id="submit-btn" onclick="resetPassword()">Opdater adgangskode</button>

    <div class="message error" id="error-msg"></div>
    <div class="message success" id="success-msg">
      ✅ Din adgangskode er opdateret! Du kan nu logge ind i Gainfully-appen.
    </div>
  </div>

  <!-- Ugyldigt link -->
  <div class="invalid-link" id="invalid-link">
    <h1>Linket er udløbet</h1>
    <p class="subtitle">Reset-links udløber efter 24 timer. Åbn appen og bed om et nyt link under "Glemt adgangskode".</p>
  </div>

  <p class="footer">© 2026 Gainfully</p>
</div>

<script>
  const SUPABASE_URL = 'https://qhqppvfyksfmcurpoyqf.supabase.co'
  const SUPABASE_ANON_KEY = 'sb_publishable_msBu3acUCYQ1h6U2Um2brQ_7idvwo2e'

  // Hent token fra URL hash
  function getParams() {
    const hash = window.location.hash.substring(1)
    const params = {}
    hash.split('&').forEach(part => {
      const [key, val] = part.split('=')
      if (key) params[key] = decodeURIComponent(val || '')
    })
    return params
  }

  const params = getParams()
  const accessToken = params['access_token']
  const type = params['type']

  // Tjek om linket er gyldigt
  if (!accessToken || type !== 'recovery') {
    document.getElementById('reset-form').style.display = 'none'
    document.getElementById('invalid-link').style.display = 'block'
  }

  async function resetPassword() {
    const password = document.getElementById('password').value
    const confirm = document.getElementById('confirm').value
    const btn = document.getElementById('submit-btn')
    const errorMsg = document.getElementById('error-msg')
    const successMsg = document.getElementById('success-msg')

    // Nulstil
    errorMsg.style.display = 'none'
    successMsg.style.display = 'none'

    // Validering
    if (password.length < 6) {
      errorMsg.textContent = 'Adgangskoden skal være mindst 6 tegn.'
      errorMsg.style.display = 'block'
      return
    }
    if (password !== confirm) {
      errorMsg.textContent = 'Adgangskoderne stemmer ikke overens.'
      errorMsg.style.display = 'block'
      return
    }

    btn.disabled = true
    btn.textContent = 'Opdaterer...'

    try {
      const response = await fetch(`${SUPABASE_URL}/auth/v1/user`, {
        method: 'PUT',
        headers: {
          'Content-Type': 'application/json',
          'apikey': SUPABASE_ANON_KEY,
          'Authorization': `Bearer ${accessToken}`
        },
        body: JSON.stringify({ password })
      })

      const data = await response.json()

      if (!response.ok) {
        throw new Error(data.message || data.error_description || 'Noget gik galt.')
      }

      // Success
      btn.style.display = 'none'
      document.querySelector('.form-group:first-of-type').style.display = 'none'
      document.querySelector('.form-group:last-of-type').style.display = 'none'
      successMsg.style.display = 'block'

    } catch (err) {
      errorMsg.textContent = err.message || 'Noget gik galt. Prøv igen.'
      errorMsg.style.display = 'block'
      btn.disabled = false
      btn.textContent = 'Opdater adgangskode'
    }
  }

  // Submit med Enter
  document.addEventListener('keydown', (e) => {
    if (e.key === 'Enter') resetPassword()
  })
</script>

</body>
</html>
